name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: configure
      run: ./configure
    - name: make
      run: cd src/c && USE_NPY=1 make -f Makefile.gmake
    - name: make install
      run: cd src/c && USE_NPY=1 make -f Makefile.gmake install
    - name: make prolog
      run: cd src/prolog && make install 
